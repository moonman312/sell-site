<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hotel Capital Stack Diagnostic — MHS</title>
<link rel="icon" href="data:image/svg+xml,<svg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'><rect%20x='7'%20y='5'%20width='18'%20height='23'%20rx='1.5'%20fill='none'%20stroke='%231f8a8a'%20stroke-width='2'/><line%20x1='4.5'%20y1='28'%20x2='27.5'%20y2='28'%20stroke='%231f8a8a'%20stroke-width='2'%20stroke-linecap='round'/><line%20x1='10.5'%20y1='9'%20x2='13'%20y2='9'%20stroke='%231f8a8a'%20stroke-width='2'%20stroke-linecap='round'/><line%20x1='19'%20y1='9'%20x2='21.5'%20y2='9'%20stroke='%231f8a8a'%20stroke-width='2'%20stroke-linecap='round'/><text%20x='16'%20y='22.5'%20text-anchor='middle'%20font-family='Georgia,serif'%20font-weight='bold'%20font-size='15'%20fill='%231f8a8a'>$</text></svg>" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'><rect%20x='7'%20y='5'%20width='18'%20height='23'%20rx='1.5'%20fill='none'%20stroke='%231f8a8a'%20stroke-width='2'/><line%20x1='4.5'%20y1='28'%20x2='27.5'%20y2='28'%20stroke='%231f8a8a'%20stroke-width='2'%20stroke-linecap='round'/><text%20x='16'%20y='22.5'%20text-anchor='middle'%20font-family='Georgia,serif'%20font-weight='bold'%20font-size='15'%20fill='%231f8a8a'>$</text></svg>" />
<style>
:root{
  --navy:#0e2a3b; --navy-2:#143b52; --teal:#1f8a8a; --teal-2:#13b3a6;
  --ink:#16242c; --muted:#5d7079; --line:#e2e8ec; --bg:#f5f7f8; --card:#ffffff;
  --good:#1f9d6b; --ok:#2f8fbf; --warn:#d98a17; --critical:#cf4040; --unknown:#8a97a0;
  --shadow:0 1px 2px rgba(16,40,55,.06),0 6px 24px rgba(16,40,55,.07);
  --r:14px; --maxw:1080px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{line-height:1.2;margin:0 0 .4em}
a{color:var(--teal)}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
.btn{display:inline-flex;align-items:center;gap:8px;border:0;border-radius:10px;padding:11px 18px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;text-decoration:none}
.btn.primary{background:var(--teal);color:#fff}
.btn.primary:hover{background:var(--teal-2)}
.btn.ghost{background:transparent;color:var(--navy);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn.dark{background:var(--navy);color:#fff}
.btn.dark:hover{background:var(--navy-2)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.tag.known{background:#e6f4ec;color:var(--good)}
.tag.estimated,.tag.range{background:#eef6fb;color:var(--ok)}
.tag.assumed{background:#fdf2e3;color:var(--warn)}
.tag.skipped,.tag.unknown{background:#eef1f3;color:var(--unknown)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:#eef1f3;color:var(--muted)}
.pill .dot{width:8px;height:8px;border-radius:50%}
.dot.good{background:var(--good)}.dot.ok{background:var(--ok)}.dot.warn{background:var(--warn)}.dot.critical{background:var(--critical)}.dot.unknown{background:var(--unknown)}

/* top bar */
header.topbar{background:var(--navy);color:#fff;position:sticky;top:0;z-index:50}
.topbar .wrap{display:flex;align-items:center;gap:16px;height:60px}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.01em}
.logo .mark{width:30px;height:30px;display:grid;place-items:center}
.logo .mark svg{width:30px;height:30px;display:block}
.logo .name{font-size:15px;font-weight:700;color:#fff;letter-spacing:.01em}
.topbar .spacer{flex:1}
.topbar .privacy{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#bcd6d6}
.topbar .privacy .dot{width:8px;height:8px;border-radius:50%;background:var(--teal-2)}
.modeswitch{display:flex;background:rgba(255,255,255,.08);border-radius:9px;padding:3px}
.modeswitch button{background:transparent;border:0;color:#cfe3e3;font-size:13px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer}
.modeswitch button.active{background:#fff;color:var(--navy)}

/* layout */
main{padding:26px 0 80px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:24px}
.card + .card{margin-top:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr}.topbar .privacy{display:none}}

/* hero */
.hero{background:linear-gradient(160deg,var(--navy),var(--navy-2));color:#fff;border-radius:18px;padding:42px 36px;margin-bottom:22px}
.hero h1{font-size:34px;max-width:18ch}
.hero p{font-size:17px;color:#cfe0e6;max-width:60ch}
.hero .ctas{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.hero .trust{margin-top:18px;font-size:13px;color:#9fc4c4}
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:10px}
@media(max-width:760px){.cards3{grid-template-columns:1fr}.hero{padding:28px 22px}.hero h1{font-size:26px}}
.usercard{border:1px solid var(--line);border-radius:12px;padding:18px;background:#fff;cursor:pointer;transition:.15s}
.usercard:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:var(--shadow)}
.usercard h4{color:var(--navy)}
.usercard p{color:var(--muted);font-size:14px;margin:0}
.usercard .k{font-size:12px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.05em}

/* stepper */
.stepper{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.stepper .s{font-size:12.5px;font-weight:600;color:var(--muted);padding:7px 11px;border-radius:8px;background:#fff;border:1px solid var(--line);cursor:pointer;white-space:nowrap}
.stepper .s.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.stepper .s.done{color:var(--teal);border-color:#cfe7e5}
.stepper .s .num{opacity:.6;margin-right:5px}

/* fields */
.field{margin-bottom:16px}
.field > label{display:block;font-weight:600;font-size:14.5px;margin-bottom:5px;color:var(--ink)}
.field .help{font-size:13px;color:var(--muted);margin:-1px 0 8px}
.field .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.field input[type=text],.field input[type=number],.field input[type=date],.field select{
  font-size:15px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);width:100%;max-width:260px}
.field input:focus,.field select:focus{outline:0;border-color:var(--teal);box-shadow:0 0 0 3px rgba(31,138,138,.12)}
.field .method{max-width:180px}
.field .rangeInputs{display:flex;gap:6px;align-items:center}
.field .rangeInputs input{max-width:120px}
.muted{color:var(--muted)}
.small{font-size:13px}
.section-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
.section-h h2{font-size:21px;color:var(--navy);margin:0}
.section-sub{color:var(--muted);margin:0 0 18px;font-size:14.5px}
.navbtns{display:flex;justify-content:space-between;gap:12px;margin-top:8px}

/* results */
.banner{border-radius:14px;padding:22px 24px;color:#fff;margin-bottom:18px}
.banner.good{background:linear-gradient(135deg,#13795a,#1f9d6b)}
.banner.ok{background:linear-gradient(135deg,#1f6a8f,#2f8fbf)}
.banner.warn{background:linear-gradient(135deg,#b06f10,#d98a17)}
.banner.critical{background:linear-gradient(135deg,#a52f2f,#cf4040)}
.banner.unknown{background:linear-gradient(135deg,#54636b,#7a8a92)}
.banner h2{font-size:26px;margin:0 0 4px}
.banner p{margin:0;color:rgba(255,255,255,.9);font-size:15px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:760px){.metrics{grid-template-columns:1fr 1fr}}
.metric{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.metric .lab{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.metric .val{font-size:24px;font-weight:800;color:var(--navy);margin-top:3px}
.metric .sub{font-size:12.5px;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.callout{border-left:4px solid var(--teal);background:#f1f8f8;padding:14px 16px;border-radius:0 10px 10px 0;margin:8px 0}
.callout.warn{border-color:var(--warn);background:#fdf6ea}
.callout.critical{border-color:var(--critical);background:#fbeeee}
.checklist li{margin-bottom:6px}
.assumption-log li{margin-bottom:6px;font-size:14px}
.confbar{height:8px;border-radius:999px;background:#eef1f3;overflow:hidden;margin-top:6px}
.confbar > span{display:block;height:100%;border-radius:999px}
.acc{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px}
.acc > summary{cursor:pointer;padding:14px 16px;font-weight:700;color:var(--navy);list-style:none;display:flex;justify-content:space-between;align-items:center}
.acc > summary::-webkit-details-marker{display:none}
.acc[open] > summary{border-bottom:1px solid var(--line)}
.acc .body{padding:16px}
/* scenario sliders */
.slider{margin-bottom:14px}
.slider label{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:5px}
.slider input[type=range]{width:100%}
.scenario-out{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:8px}
@media(max-width:760px){.scenario-out{grid-template-columns:1fr}}
.cta-band{background:linear-gradient(135deg,var(--navy),var(--teal));color:#fff;border-radius:16px;padding:26px}
.cta-band h3{color:#fff;font-size:20px}
.cta-band p{color:#dceaea;margin:0 0 14px}
.foot{color:var(--muted);font-size:12.5px;text-align:center;padding:30px 0 10px;border-top:1px solid var(--line);margin-top:30px}
.hidden{display:none!important}
.flagrow{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(14,42,59,.55);display:grid;place-items:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:14px;max-width:520px;width:100%;padding:24px;box-shadow:var(--shadow)}
.checkrow{display:flex;gap:10px;align-items:flex-start;margin:10px 0;font-size:14px}
.checkrow input{margin-top:3px}
@media print{header.topbar,.stepper,.navbtns,.no-print{display:none!important}body{background:#fff}}
</style>
</head>
<body>
<header class="topbar">
  <div class="wrap">
    <div class="logo"><span class="mark"><svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g fill="none" stroke="#13b3a6" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="5" width="18" height="23" rx="1.5"/><line x1="4.5" y1="28" x2="27.5" y2="28"/><line x1="10.5" y1="8.7" x2="13" y2="8.7"/><line x1="19" y1="8.7" x2="21.5" y2="8.7"/></g><text x="16" y="22.5" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="bold" font-size="15" fill="#13b3a6">$</text></svg></span><span class="name">Capital Stack Diagnostic</span></div>
    <div class="spacer"></div>
    <div class="modeswitch" id="modeswitch">
      <button data-mode="quick">Quick</button>
      <button data-mode="beginner">Guide me</button>
      <button data-mode="expert">Expert</button>
    </div>
    <div class="privacy"><span class="dot"></span><span id="privacyLabel">Session-only · nothing leaves your browser</span></div>
    <button class="btn ghost sm no-print" id="privacyBtn" style="color:#cfe3e3;border-color:rgba(255,255,255,.2)">Privacy</button>
  </div>
</header>

<main><div class="wrap" id="app"></div></main>

<div id="modalRoot"></div>

<!-- ===================== ENGINE ===================== -->
<script>
/* ============================================================================
   Hotel Capital Stack Diagnostic — Deterministic Calculation Engine
   Modern Hospitality Solutions (MHS)
   ----------------------------------------------------------------------------
   This layer NEVER relies on AI to do math. All functions are pure and
   auditable. Inputs are plain numbers; functions return numbers or small
   objects. UI and AI explanation layers consume these outputs.
   ============================================================================ */
(function (global) {
  "use strict";

  // ---- low-level helpers ---------------------------------------------------
  function isNum(x) { return typeof x === "number" && isFinite(x); }
  function pct(x) { return x / 100; }
  function round(x, d) { d = d == null ? 2 : d; var f = Math.pow(10, d); return Math.round(x * f) / f; }

  /* Loan constant = annual debt service per $1 of loan, fully amortizing. */
  function loanConstant(rateAnnualPct, amortYears, interestOnly) {
    var r = pct(rateAnnualPct);
    if (interestOnly) return r;
    if (!isNum(r) || r <= 0) return null;
    if (!isNum(amortYears) || amortYears <= 0) return null;
    var i = r / 12, n = amortYears * 12;
    return (i / (1 - Math.pow(1 + i, -n))) * 12;
  }

  function annualDebtServiceFromLoan(balance, rateAnnualPct, amortYears, interestOnly) {
    var k = loanConstant(rateAnnualPct, amortYears, interestOnly);
    if (k == null || !isNum(balance)) return null;
    return balance * k;
  }

  function dscr(noi, annualDebtService) {
    if (!isNum(noi) || !isNum(annualDebtService) || annualDebtService <= 0) return null;
    return noi / annualDebtService;
  }

  function dscrBand(d) {
    if (d == null) return { label: "Unknown", tone: "unknown" };
    if (d < 1.0) return { label: "Below 1.00x — NOI does not cover debt service", tone: "critical" };
    if (d < 1.2) return { label: "1.00x–1.20x — thin coverage", tone: "warn" };
    if (d < 1.35) return { label: "1.20x–1.35x — may be acceptable", tone: "ok" };
    return { label: "1.35x+ — generally healthier", tone: "good" };
  }

  /* Plain-dollar cash flow after debt service (before capex/reserves). */
  function cashAfterDebt(noi, annualDebtService) {
    if (!isNum(noi) || !isNum(annualDebtService)) return null;
    return noi - annualDebtService;
  }

  function requiredNOI(annualDebtService, targetDSCR) {
    if (!isNum(annualDebtService) || !isNum(targetDSCR)) return null;
    return annualDebtService * targetDSCR;
  }

  function breakEvenNOI(annualDebtService) { return isNum(annualDebtService) ? annualDebtService : null; }

  function debtYield(noi, loanBalance) {
    if (!isNum(noi) || !isNum(loanBalance) || loanBalance <= 0) return null;
    return (noi / loanBalance) * 100;
  }

  /* Supportable loan = the binding (minimum) of DSCR, debt-yield, and LTV tests. */
  function supportableLoan(o) {
    var k = loanConstant(o.refiRatePct, o.amortYears, false), tests = {};
    if (isNum(o.noi) && isNum(o.targetDSCR) && k) tests.dscr = (o.noi / o.targetDSCR) / k;
    if (isNum(o.noi) && isNum(o.minDebtYieldPct) && o.minDebtYieldPct > 0) tests.debtYield = o.noi / pct(o.minDebtYieldPct);
    if (isNum(o.value) && isNum(o.maxLTVPct) && o.maxLTVPct > 0) tests.ltv = o.value * pct(o.maxLTVPct);
    var vals = Object.keys(tests).map(function (k2) { return tests[k2]; }).filter(isNum);
    if (!vals.length) return { loan: null, binding: null, tests: tests };
    var loan = Math.min.apply(null, vals);
    var binding = Object.keys(tests).filter(function (k2) { return tests[k2] === loan; })[0];
    return { loan: loan, binding: binding, tests: tests };
  }

  /* Required NOI to refinance the CURRENT balance — uses the SAME binding logic
     as supportableLoan (max of the DSCR-implied and debt-yield-implied NOI), so
     the two outputs always tell a consistent story. */
  function requiredNOIToRefinance(o) {
    var k = loanConstant(o.refiRatePct, o.amortYears, false);
    var byDSCR = (isNum(o.balance) && k && isNum(o.targetDSCR)) ? o.balance * k * o.targetDSCR : null;
    var byDY = (isNum(o.balance) && isNum(o.minDebtYieldPct)) ? o.balance * pct(o.minDebtYieldPct) : null;
    var vals = [byDSCR, byDY].filter(isNum);
    if (!vals.length) return null;
    return { value: Math.max.apply(null, vals), byDSCR: byDSCR, byDebtYield: byDY,
             binding: byDSCR != null && (byDY == null || byDSCR >= byDY) ? "dscr" : "debtYield" };
  }

  /* Sources & uses refinance gap. The honest hole to clear at maturity:
       (existing balance + net capex due + refi costs + prepay/defeasance) − supportable proceeds. */
  function refinanceGap(o) {
    if (!isNum(o.balance) || !isNum(o.supportableProceeds)) return null;
    var refiCost = isNum(o.refiCostPct) ? o.supportableProceeds * pct(o.refiCostPct) : 0;
    var netCapex = isNum(o.netCapex) && o.netCapex > 0 ? o.netCapex : 0;
    var prepay = isNum(o.prepay) ? o.prepay : 0;
    var uses = o.balance + netCapex + refiCost + prepay;
    return { gap: uses - o.supportableProceeds, uses: uses, refiCost: refiCost, netCapex: netCapex, prepay: prepay, balance: o.balance };
  }

  /* Translate a required NOI lift into hotel operating terms — PER LEVER.
     ADR carries almost no incremental cost (~90% flow-through); occupancy carries
     variable cost (~65%); expense cuts are 100%. A blended rate frames the headline
     total-revenue figure. */
  function noiLiftTranslation(o) {
    var blended = isNum(o.flowThroughPct) ? o.flowThroughPct : 55;
    var adrFt = isNum(o.adrFlowPct) ? o.adrFlowPct : 90;
    var occFt = isNum(o.occFlowPct) ? o.occFlowPct : 65;
    if (!isNum(o.currentNOI) || !isNum(o.targetNOI)) return null;
    var lift = o.targetNOI - o.currentNOI;
    var out = { noiLift: lift, flowThroughPct: blended, adrFlowPct: adrFt, occFlowPct: occFt };
    if (lift <= 0) { out.alreadyMeets = true; return out; }
    out.annualRevenueIncrease = lift / pct(blended);
    out.monthlyRevenueIncrease = out.annualRevenueIncrease / 12;
    out.expenseReduction = lift;
    if (isNum(o.rooms) && o.rooms > 0) {
      var rn = o.rooms * 365;
      out.revparIncrease = out.annualRevenueIncrease / rn;
      if (isNum(o.occPct) && o.occPct > 0) {
        var roomsRevForADR = lift / pct(adrFt);       // ADR lever: high flow-through
        out.adrIncreaseAtCurrentOcc = roomsRevForADR / (rn * pct(o.occPct));
      }
      if (isNum(o.adr) && o.adr > 0) {
        var roomsRevForOcc = lift / pct(occFt);       // occupancy lever: lower flow-through
        out.occPointIncreaseAtCurrentADR = (roomsRevForOcc / (o.adr * rn)) * 100;
      }
    }
    return out;
  }

  function rateShock(o) {
    return (o.rates || []).map(function (rt) {
      var ads = annualDebtServiceFromLoan(o.balance, rt, o.amortYears, false);
      return { ratePct: rt, annualDebtService: ads, dscr: dscr(o.noi, ads) };
    });
  }

  function maturityRisk(m) {
    if (!isNum(m)) return { score: "Unknown", tone: "unknown" };
    if (m <= 6) return { score: "Critical", tone: "critical" };
    if (m <= 18) return { score: "High", tone: "warn" };
    if (m <= 36) return { score: "Medium", tone: "ok" };
    return { score: "Low", tone: "good" };
  }

  function capexPressure(c, noi) {
    if (!isNum(c) || c <= 0) return { score: "None/Low", tone: "good", ratio: 0 };
    if (!isNum(noi) || noi <= 0) return { score: "Unknown", tone: "unknown", ratio: null };
    var r = c / noi;
    if (r >= 1.5) return { score: "High", tone: "critical", ratio: r };
    if (r >= 0.5) return { score: "Medium", tone: "warn", ratio: r };
    return { score: "Low", tone: "ok", ratio: r };
  }

  function triage(m) {
    var issues = [];
    if (isNum(m.dscr) && m.dscr < 1.0) issues.push({ key: "operations", weight: 100,
      title: "Operating performance shortfall",
      detail: "Current NOI does not cover existing debt service (DSCR below 1.00x). This is first an operations/coverage problem before it is a refinance problem." });
    else if (isNum(m.dscr) && isNum(m.targetDSCR) && m.dscr < m.targetDSCR) issues.push({ key: "operations", weight: 60,
      title: "Thin debt-service coverage",
      detail: "The property covers debt service, but coverage is below a typical lender target. NOI improvement would strengthen the position." });
    if (isNum(m.refiGap) && m.refiGap > 0) issues.push({ key: "stack", weight: 75,
      title: "Refinance proceeds gap",
      detail: "At current NOI, supportable new debt — after capex and refinancing costs — appears lower than what’s needed to pay off the existing loan. This is a capital-stack / refinance-proceeds issue, not only a monthly-payment issue." });
    if (isNum(m.monthsToMaturity)) {
      if (m.monthsToMaturity <= 6) issues.push({ key: "maturity", weight: 95,
        title: "Imminent loan maturity",
        detail: "Maturity is within 6 months. Time, not just NOI, is the binding constraint. A lender conversation should be a priority." });
      else if (m.monthsToMaturity <= 18) issues.push({ key: "maturity", weight: 78,
        title: "Near-term loan maturity",
        detail: "Maturity is within ~18 months. There may be a window to improve NOI or arrange an extension before refinancing." });
    }
    if (isNum(m.capexRatio) && m.capexRatio >= 0.5) issues.push({ key: "capex", weight: m.capexRatio >= 1.5 ? 80 : 55,
      title: "Capital / PIP burden",
      detail: "Required capital spend is large relative to annual NOI. This competes with debt service and can erode refinance capacity." });
    if (m.floating || (isNum(m.currentRatePct) && m.currentRatePct >= 8)) issues.push({ key: "rate", weight: m.floating ? 66 : 50,
      title: "Interest-rate exposure",
      detail: m.floating ? "Floating-rate debt leaves the property exposed to further payment increases." : "The current rate is elevated; payment relief may require a rate buydown, modification, or refinance." });
    issues.sort(function (a, b) { return b.weight - a.weight; });
    return { issues: issues,
      primary: issues[0] || { key: "insufficient", title: "Not enough information",
        detail: "Provide more inputs (NOI, debt service, balance, maturity) to identify the primary issue." },
      combination: issues.length >= 3 };
  }

  /* ----------------------------------------------------------------------
     Distribution & unit-cost economics. Forward-only — these never alter the
     current diagnosis (current NOI already reflects actual commissions). They
     (a) derive per-lever flow-through from the property's own mix, and
     (b) turn distribution into levers the owner can pull.
     ---------------------------------------------------------------------- */
  function clampPct(x) { return Math.max(0, Math.min(100, x)); }

  /* Per-lever flow-through from actual distribution mix.
     blendedComm = OTA share × OTA commission (percentage points of room revenue).
     ADR lever: only commission rides on the incremental rate.
     Occupancy lever: commission + variable cost per occupied room (CPOR). */
  function flowThroughFromActuals(o) {
    if (!isNum(o.otaSharePct) || !isNum(o.otaCommissionPct)) return null;
    var blendedComm = (o.otaSharePct / 100) * o.otaCommissionPct;
    var adrFlow = clampPct(100 - blendedComm);
    var occFlow = null;
    if (isNum(o.cpor) && isNum(o.adr) && o.adr > 0) occFlow = clampPct(100 - blendedComm - (o.cpor / o.adr) * 100);
    return { blendedComm: blendedComm, adrFlow: adrFlow, occFlow: occFlow };
  }

  /* Shifting bookings OTA -> direct. Benefit is the SPREAD (OTA commission − direct
     acquisition cost), not the full commission — direct booking isn't free. */
  function channelShiftBenefit(o) {
    if (!isNum(o.points) || !isNum(o.roomRevenue) || !isNum(o.otaCommissionPct)) return null;
    var directCost = isNum(o.directCostPct) ? o.directCostPct : 0;
    var spread = o.otaCommissionPct - directCost;
    return (o.points / 100) * o.roomRevenue * (spread / 100);
  }

  /* Negotiating the OTA commission rate down by N points. Savings apply only to
     the OTA-channeled portion of room revenue. */
  function commissionCutBenefit(o) {
    if (!isNum(o.points) || !isNum(o.roomRevenue) || !isNum(o.otaSharePct)) return null;
    return (o.points / 100) * (o.otaSharePct / 100) * o.roomRevenue;
  }

  /* ----------------------------------------------------------------------
     Capital stack waterfall. Walks the stack from most senior to most junior
     and, at a given value, shows who is covered, impaired, or wiped — the
     "who gets paid first if things go sideways" view. Deterministic.
     layers: [{ name, kind, amount }] ordered senior -> junior (debt then pref).
     ---------------------------------------------------------------------- */
  function capitalStack(o) {
    var layers = (o.layers || []).filter(function (l) { return isNum(l.amount) && l.amount > 0; });
    var value = o.value, cum = 0, out = [];
    layers.forEach(function (l) {
      var lower = cum, upper = cum + l.amount;
      var recovery = null, status = "unknown", cushion = null, cushionPct = null, attachLTV = null, detachLTV = null;
      if (isNum(value)) {
        recovery = Math.max(0, Math.min(value - lower, l.amount));
        status = recovery >= l.amount - 1e-6 ? "covered" : recovery <= 1e-6 ? "wiped" : "impaired";
        cushion = value - upper;                       // $ of value above this layer's top
        cushionPct = value > 0 ? (cushion / value) * 100 : null;
      }
      if (isNum(value) && value > 0) { attachLTV = lower / value * 100; detachLTV = upper / value * 100; }
      out.push({ name: l.name, kind: l.kind, amount: l.amount, lower: lower, upper: upper,
        recovery: recovery, shortfall: isNum(recovery) ? (l.amount - recovery) : null,
        status: status, cushion: cushion, cushionPct: cushionPct, attachLTV: attachLTV, detachLTV: detachLTV });
      cum = upper;
    });
    var totalStack = cum;
    var commonEquity = isNum(o.commonEquity) ? o.commonEquity : (isNum(value) ? Math.max(0, value - totalStack) : null);
    var sponsorStatus = commonEquity == null ? "unknown" : (commonEquity > 0 ? "in the money" : "wiped");
    // how far value can fall before common equity is wiped (i.e., before debt+pref exceed value)
    var equityCushion = isNum(value) ? value - totalStack : null;
    var equityCushionPct = isNum(value) && value > 0 ? (equityCushion / value) * 100 : null;
    var leverageLTV = isNum(value) && value > 0 ? totalStack / value * 100 : null;
    return { layers: out, totalStack: totalStack, commonEquity: commonEquity, value: value,
      leverageLTVpct: leverageLTV, sponsorStatus: sponsorStatus,
      equityCushion: equityCushion, equityCushionPct: equityCushionPct };
  }

  /* Confidence — based on DATA COMPLETENESS, not good/bad results. */
  function confidence(fields) {
    var totW = 0, score = 0, sw = { known: 1, estimated: 0.6, range: 0.6, unknown: 0, skipped: 0 };
    fields.forEach(function (f) {
      var w = isNum(f.weight) ? f.weight : 1; totW += w;
      score += w * (sw[f.status] != null ? sw[f.status] : 0);
    });
    if (totW === 0) return { pct: 0, label: "Low", tone: "warn" };
    var p = score / totW;
    return { pct: Math.round(p * 100), label: p >= 0.8 ? "High" : p >= 0.5 ? "Medium" : "Low", tone: p >= 0.8 ? "good" : p >= 0.5 ? "ok" : "warn" };
  }

  var ENGINE = {
    loanConstant: loanConstant, annualDebtServiceFromLoan: annualDebtServiceFromLoan,
    dscr: dscr, dscrBand: dscrBand, cashAfterDebt: cashAfterDebt,
    requiredNOI: requiredNOI, breakEvenNOI: breakEvenNOI, debtYield: debtYield,
    supportableLoan: supportableLoan, requiredNOIToRefinance: requiredNOIToRefinance,
    refinanceGap: refinanceGap, noiLiftTranslation: noiLiftTranslation, rateShock: rateShock,
    maturityRisk: maturityRisk, capexPressure: capexPressure, triage: triage,
    flowThroughFromActuals: flowThroughFromActuals, channelShiftBenefit: channelShiftBenefit,
    commissionCutBenefit: commissionCutBenefit, capitalStack: capitalStack,
    confidence: confidence, round: round
  };
  if (typeof module !== "undefined" && module.exports) module.exports = ENGINE;
  global.HCSD = ENGINE;
})(typeof window !== "undefined" ? window : globalThis);

</script>

/* ---------- compute orchestration ---------- */
function resolveADS(){
  var mp=valOf("monthlyPayment");
  if(mp!=null)return {ads:mp*12, src:"monthly payment", io:get("interestOnly").value==="Yes"};
  var bal=valOf("loanBalance"), rate=valOf("rate"), am=valOf("amort");
  var io=get("interestOnly").value==="Yes"||(am!=null&&am===0);
  if(bal!=null&&rate!=null&&(io||am!=null)){var k=E.loanConstant(rate,io?0:am,io);if(k!=null)return {ads:bal*k, src:"loan terms", io:io};}
  return {ads:null, src:null, io:io};
}
function resolveNOI(){
  var noi=valOf("noi");
  if(noi!=null)return {noi:noi, src:"entered"};
  var rev=valOf("totalRevenue"), margin=valOf("margin");
  if(rev!=null&&margin!=null)return {noi:rev*(margin/100), src:"estimated from revenue × margin"};
  return {noi:null, src:null};
}
function compute(scenario){
  scenario=scenario||{};
  var assumptions=[];
  var noiR=resolveNOI(), noi=noiR.noi;
  var rev=valOf("totalRevenue"), occ=valOf("occ"), adr=valOf("adr"), rooms=valOf("rooms");
  var ptype=get("ptype").value;
  var fdef=FLOW_DEFAULTS[ptype]||FLOW_DEFAULTS._default;
  var flowThrough=fdef.blended;
  // room revenue (for per-lever and distribution math); fall back to total revenue
  var roomRevenue=(adr!=null&&occ!=null&&rooms!=null)?adr*(occ/100)*rooms*365:(rev!=null?rev:null);
  // distribution inputs + actuals-derived per-lever flow-through
  var otaShare=valOf("otaShare"), otaComm=valOf("otaCommission"), directCost=valOf("directCost"), cpor=valOf("cpor");
  var adrFlow=fdef.adr, occFlow=fdef.occ, flowSrc="default";
  if(fdef!==FLOW_DEFAULTS._default) assumptions.push("Flow-through defaults adjusted for a "+ptype.toLowerCase()+" model (leaner cost base): blended "+flowThrough+"%, ADR "+adrFlow+"%, occupancy "+occFlow+"%.");
  var fa=E.flowThroughFromActuals({otaSharePct:otaShare,otaCommissionPct:otaComm,cpor:cpor,adr:adr});
  if(fa){flowSrc="actuals";adrFlow=fa.adrFlow;if(fa.occFlow!=null)occFlow=fa.occFlow;
    assumptions.push("Operating flow-through derived from your mix ("+otaShare+"% OTA at "+otaComm+"% commission"+(cpor!=null?(", $"+cpor+"/occupied room"):"")+"): ADR "+Math.round(adrFlow)+"%"+(fa.occFlow!=null?", occupancy "+Math.round(occFlow)+"%":" (occupancy uses default — add cost per occupied room)")+".");}
  else assumptions.push("Operating flow-through uses "+(fdef!==FLOW_DEFAULTS._default?"type-based":"default")+" rates (ADR "+adrFlow+"%, occupancy "+occFlow+"%) — add OTA mix & commission to base this on your actuals.");
  // NOI margin reasonableness (only when NOI was entered directly, not derived from a margin)
  var impliedMargin=null, marginFlag=null;
  if(noiR.src==="entered"&&rev!=null&&rev>0&&noiR.noi!=null){impliedMargin=noiR.noi/rev*100;var mb=MARGIN_BANDS[ptype]||MARGIN_BANDS._default;marginFlag={pct:impliedMargin,band:mb,status:impliedMargin<mb[0]?"low":impliedMargin>mb[1]?"high":"within"};}
  if(noi!=null&&scenario.applied){
    var addNOI=0;
    if(roomRevenue!=null){
      addNOI+=(scenario.adrPct||0)/100*roomRevenue*(adrFlow/100);   // ADR lever (per-lever flow-through)
      addNOI+=(scenario.occPct||0)/100*roomRevenue*(occFlow/100);   // occupancy lever
    }
    addNOI+=(scenario.expenseCut||0);
    if(roomRevenue!=null&&otaComm!=null&&scenario.shiftToDirect) addNOI+=E.channelShiftBenefit({points:scenario.shiftToDirect,roomRevenue:roomRevenue,otaCommissionPct:otaComm,directCostPct:directCost!=null?directCost:DEF.directCost});
    if(roomRevenue!=null&&otaShare!=null&&scenario.commissionCut) addNOI+=E.commissionCutBenefit({points:scenario.commissionCut,roomRevenue:roomRevenue,otaSharePct:otaShare});
    noi=noi+addNOI;
  }
  var adsR=resolveADS(), ads=adsR.ads;
  if(scenario.applied&&scenario.io&&valOf("loanBalance")!=null){ads=valOf("loanBalance")*E.loanConstant(scenario.refiRate||DEF.refiRateMid,0,true);}
  var dscr=E.dscr(noi,ads);
  var cash=E.cashAfterDebt(noi,ads);

  var tDSCR=valOf("targetDSCR"); if(tDSCR==null){tDSCR=DEF.targetDSCRmid;assumptions.push("Lender target DSCR not provided — modeled at "+DEF.targetDSCRs.join("x / ")+"x (base case "+DEF.targetDSCRmid+"x).");}
  var rRate=scenario.refiRate||valOf("refiRate"); if(rRate==null){rRate=DEF.refiRateMid;assumptions.push("Refinance rate not provided — modeled at "+DEF.refiRates.join("% / ")+"% (base case "+DEF.refiRateMid+"%).");}
  var rAmort=valOf("refiAmort"); if(rAmort==null){rAmort=DEF.refiAmort;assumptions.push("Refinance amortization assumed at "+DEF.refiAmort+" years.");}
  var mdy=valOf("minDebtYield"); if(mdy==null){mdy=DEF.minDebtYield;assumptions.push("Minimum debt yield assumed at "+DEF.minDebtYield+"%.");}
  var ltv=valOf("maxLTV"); if(ltv==null){ltv=DEF.maxLTV;assumptions.push("Maximum LTV assumed at "+DEF.maxLTV+"% (only applied if a value or cap rate is given).");}
  var value=valOf("value"), capRate=valOf("capRate");
  if(value==null&&capRate!=null&&capRate>0&&noi!=null){value=noi/(capRate/100);assumptions.push("Property value estimated from NOI ÷ cap rate ("+capRate+"%) = "+fmtMoney(value)+".");}

  var reqNOI=ads!=null?E.requiredNOI(ads,tDSCR):null;
  var bal=valOf("loanBalance");
  var dy=E.debtYield(noi,bal);
  var sup=E.supportableLoan({noi:noi,targetDSCR:tDSCR,refiRatePct:rRate,amortYears:rAmort,minDebtYieldPct:mdy,maxLTVPct:ltv,value:value});

  // capex (net of reserve) and sources&uses gap
  var capTotal=(valOf("pip")||0)+(valOf("deferred")||0)+(valOf("plannedReno")||0);
  var capNet=capTotal-(valOf("capexReserve")||0);
  var prepay=valOf("prepayPenalty")||0;
  var gapObj=(bal!=null&&sup.loan!=null)?E.refinanceGap({balance:bal,supportableProceeds:sup.loan,refiCostPct:DEF.refiCostPct,netCapex:Math.max(0,capNet),prepay:prepay}):null;
  var gap=gapObj?gapObj.gap:null;

  var rnoObj=E.requiredNOIToRefinance({balance:bal,refiRatePct:rRate,amortYears:rAmort,targetDSCR:tDSCR,minDebtYieldPct:mdy});
  var reqNOItoRefi=rnoObj?rnoObj.value:null;
  var lift=(noi!=null&&reqNOItoRefi!=null)?E.noiLiftTranslation({currentNOI:noi,targetNOI:reqNOItoRefi,rooms:rooms,occPct:occ,adr:adr,flowThroughPct:flowThrough,adrFlowPct:adrFlow,occFlowPct:occFlow}):null;

  var months=monthsTo(rawOf("maturity")), matRisk=E.maturityRisk(months);
  var capPress=E.capexPressure(capTotal,noi);
  var curRate=valOf("rate"), shock=null;
  if(bal!=null&&curRate!=null)shock=E.rateShock({balance:bal,amortYears:(adsR.io?0:(valOf("amort")||rAmort)),noi:noi,rates:[curRate,curRate+1,curRate+2,curRate+3]});
  var floating=get("floating").value==="Floating";

  // ---- capital stack waterfall ----
  var mezz=valOf("mezzBalance"), pref=valOf("prefBalance");
  var stackLayers=[];
  if(bal!=null) stackLayers.push({name:"Senior mortgage",kind:"debt",amount:bal});
  if(mezz!=null) stackLayers.push({name:"Mezzanine / 2nd loan",kind:"debt",amount:mezz});
  if(pref!=null) stackLayers.push({name:"Preferred equity",kind:"pref",amount:pref});
  var stack=(stackLayers.length&&value!=null)?E.capitalStack({layers:stackLayers,value:value}):(stackLayers.length?E.capitalStack({layers:stackLayers}):null);

  // ---- exposure / liability read ----
  var exposure=exposureRead();

  var tri=E.triage({dscr:dscr,targetDSCR:tDSCR,refiGap:gap,monthsToMaturity:months,capexRatio:capPress.ratio,floating:floating,currentRatePct:curRate,currentNOI:noi});
  // merge structural + exposure + stack findings into the SAME triage (one diagnosis, not separate tools)
  var extra=[];
  if(stack&&stack.value!=null){
    if(stack.sponsorStatus==="wiped") extra.push({key:"stack",weight:88,title:"Your equity is underwater",detail:"At today’s estimated value, the debt"+(pref!=null?" and preferred equity":"")+" exceed what the property is worth — in a sale today your common equity would not recover."});
    else if(stack.equityCushionPct!=null&&stack.equityCushionPct<10) extra.push({key:"stack",weight:70,title:"Thin equity cushion",detail:"Value would only need to fall about "+Math.round(stack.equityCushionPct)+"% before your equity is wiped out."});
    var impaired=stack.layers.filter(function(l){return l.status==="impaired"||l.status==="wiped";});
    if(impaired.length) extra.push({key:"stack",weight:74,title:"Part of the capital stack is exposed",detail:impaired.map(function(l){return l.name;}).join(" and ")+" would not be fully repaid at today’s value — expect resistance from those holders in any restructuring."});
  }
  if(exposure&&exposure.severity>=55) extra.push({key:"exposure",weight:exposure.weight,title:exposure.title,detail:exposure.detail});
  structuralIssues({dscr:dscr,targetDSCR:tDSCR,months:months,floating:floating}).forEach(function(i){extra.push(i);});
  if(extra.length){
    tri.issues=tri.issues.concat(extra).sort(function(a,b){return b.weight-a.weight;});
    tri.primary=tri.issues[0];
    tri.combination=tri.issues.length>=3;
  }

  return {noi:noi,noiSrc:noiR.src,annualDebtService:ads,adsSrc:adsR.src,io:adsR.io,dscr:dscr,cashAfterDebt:cash,
    targetDSCR:tDSCR,requiredNOI:reqNOI,debtYield:dy,supportable:sup,refiGap:gap,refiGapObj:gapObj,
    requiredNOItoRefi:reqNOItoRefi,reqNOIObj:rnoObj,noiLift:lift,months:months,maturityRisk:matRisk,
    capexTotal:capTotal,capexNet:capNet,capexPressure:capPress,liquidity:valOf("liquidity"),
    rateShock:shock,floating:floating,refiRate:rRate,refiAmort:rAmort,minDebtYield:mdy,maxLTV:ltv,value:value,
    triage:tri,assumptions:assumptions,rooms:rooms,occ:occ,adr:adr,
    roomRevenue:roomRevenue,otaShare:otaShare,otaComm:otaComm,directCost:directCost,cpor:cpor,
    adrFlow:adrFlow,occFlow:occFlow,flowSrc:flowSrc,
    stack:stack,exposure:exposure,lenderType:get("lenderType").value,
    ptype:ptype,impliedMargin:impliedMargin,marginFlag:marginFlag};
}

/* ---------- confidence ---------- */
function sectionConfidence(sec){
  var keys=Object.keys(FIELDS).filter(function(k){return FIELDS[k].section===sec&&(FIELDS[k].sensitive||FIELDS[k].weight>=1);});
  return E.confidence(keys.map(function(k){return {weight:FIELDS[k].weight,status:statusOf(k)};}));
}
function overallConfidence(){
  return E.confidence(Object.keys(FIELDS).map(function(k){return {weight:FIELDS[k].weight,status:statusOf(k)};}));
}

/* ---------- capital stack options ---------- */
var STACK_OPTIONS=[
  {n:"Improve NOI, refinance later",solves:"Refi proceeds gap; coverage",notsolve:"Imminent maturity",control:"Full",complexity:"Medium",fit:"Time before maturity + real operating upside"},
  {n:"Request a loan extension",solves:"Maturity timing",notsolve:"Underlying NOI gap",control:"Full",complexity:"Low–Med",fit:"Near maturity, lender relationship intact"},
  {n:"Temporary interest-only period",solves:"Short-term cash flow",notsolve:"Proceeds gap at refi",control:"Full",complexity:"Low",fit:"Thin coverage, fixable operations"},
  {n:"Pay down principal",solves:"Refi gap; debt yield",notsolve:"Operating weakness",control:"Full",complexity:"Low",fit:"Owner has capital to inject"},
  {n:"Preferred equity",solves:"Capital gap without full sale",notsolve:"Long-run economics if NOI weak",control:"Reduced",complexity:"High",fit:"Need capital, want to retain control-ish"},
  {n:"JV equity",solves:"Larger capital need",notsolve:"Full ownership retention",control:"Shared",complexity:"High",fit:"Larger gap, willing to share upside"},
  {n:"Sell the asset",solves:"Eliminates the debt problem",notsolve:"Retaining the asset",control:"None after sale",complexity:"Medium",fit:"Gap too large to bridge; better exit now"},
  {n:"Refinance at lower proceeds",solves:"Resets the loan",notsolve:"Requires equity to cover gap",control:"Full",complexity:"Medium",fit:"Some equity available; rate/term reset wanted"},
  {n:"Delay / phase capex",solves:"Near-term cash pressure",notsolve:"Brand/PIP obligations long-term",control:"Full",complexity:"Low",fit:"Discretionary capex; PIP timing flexible"},
  {n:"Operational fix + capital restructure",solves:"Most combination cases",notsolve:"—",control:"Varies",complexity:"High",fit:"Problem is genuinely multi-cause"}
];
function relevantOptions(m){
  var picks=[],k=m.triage.primary.key;
  function add(name){var o=STACK_OPTIONS.filter(function(x){return x.n===name;})[0];if(o&&picks.indexOf(o)<0)picks.push(o);}
  if(k==="maturity"){add("Request a loan extension");add("Improve NOI, refinance later");add("Refinance at lower proceeds");}
  if(k==="operations"){add("Improve NOI, refinance later");add("Temporary interest-only period");add("Operational fix + capital restructure");}
  if(k==="stack"){add("Pay down principal");add("Preferred equity");add("Improve NOI, refinance later");add("Refinance at lower proceeds");}
  if(k==="capex"){add("Delay / phase capex");add("Pay down principal");add("Improve NOI, refinance later");}
  if(k==="rate"){add("Temporary interest-only period");add("Refinance at lower proceeds");add("Improve NOI, refinance later");}
  if(m.triage.combination){add("Operational fix + capital restructure");add("JV equity");}
  if(m.refiGap!=null&&m.refiGap>0)add("Sell the asset");
  if(!picks.length){add("Improve NOI, refinance later");add("Request a loan extension");}
  return picks.slice(0,6);
}

  "Life company":{good:["Low rates, long fixed terms, very stable","Typically non-recourse"],
    risks:["Conservative leverage — less proceeds","Yield-maintenance prepayment is expensive","Little flexibility to modify"],

/* ---------- knowledge: default / workout sequencing (not legal advice) ---------- */
var DEFAULT_SEQUENCE=[
  ["Covenant trip (e.g., DSCR below the required level)","Often the FIRST signal. May trigger a cash sweep/trap or a default notice even while you’re current on payments. Usually has a cure path — a paydown, a waiver, or a reset."],
  ["Maturity default (loan comes due, can’t pay it off)","The most common hotel distress today. The lender can extend, modify, or pursue remedies. This is where an extension request lives."],
  ["Payment default (missed payments)","More serious. Starts cure periods, default interest, and the path toward enforcement."],
  ["Lender remedies","Forbearance (a written pause), loan modification, deed-in-lieu (hand back the keys), receivership, or foreclosure. Order and options depend on the documents and the state."],
  ["If there’s mezzanine / preferred above your equity","Intercreditor rules govern who can act, cure, or take over — the senior lender usually has standstill and consent rights over the junior. Juniors may cure to protect their position."]
];

/* ---------- exposure read (who’s on the hook, plain English) ---------- */
function exposureRead(){
  var rec=get("recourse").value, gtee=get("guarantee").value, who=get("guarantor").value, other=get("otherGuarantees").value;
  if(!rec && !gtee) return null;
  var flags=[], goods=[], severity=0, title="", detail="";
  if(gtee==="Yes — full guarantee" || rec==="Recourse"){
    severity=80; title="High personal exposure";
    flags.push("You appear to be personally on the hook for the debt — a shortfall on the property can reach your other assets.");
  } else if(gtee==="Yes — partial / limited"){
    severity=55; title="Partial personal exposure";
    flags.push("A partial/limited guarantee caps your exposure but it is still personal — know the cap and any burn-off conditions.");
  } else if(gtee==="Only ‘bad-boy’ carve-outs" || rec==="Non-recourse"){
    severity=25; title="Mostly limited exposure (with carve-outs)";
    goods.push("Non-recourse generally limits you to the property.");
    flags.push("‘Bad-boy’ carve-outs can make it personal if certain acts occur — most commonly filing bankruptcy, fraud/misrepresentation, or an unapproved transfer or further encumbrance. Avoid tripping them, especially in a workout.");
  } else {
    severity=10; title="Exposure unclear";
    flags.push("Find your recourse terms and any guaranty in the loan documents — this determines what’s personally at risk.");
  }
  if(other==="Yes") flags.push("A completion or environmental guarantee/indemnity usually stays personal even on a non-recourse loan.");
  if(who==="Me and partners") flags.push("Exposure is shared with partners — joint-and-several liability often means any one guarantor can be pursued for the whole amount.");
  if(who==="An entity only (no individuals)") goods.push("Exposure appears limited to an entity, not individuals — worth confirming.");
  detail=flags.join(" ");
  return {severity:severity, weight:severity, title:title, detail:detail, goods:goods, flags:flags};
}

/* ---------- structural risk from loan type + situation ---------- */
function structuralIssues(m){
  var out=[], lt=get("lenderType").value;
  if(lt==="CMBS"){
    if(get("cashMgmt").value==="Yes" && m.dscr!=null && m.dscr<1.25) out.push({key:"structural",weight:72,title:"CMBS cash-trap risk",detail:"With a lockbox in place and coverage thin, a cash-management sweep may trigger — diverting your cash flow. Confirm the trigger level and your headroom."});
    if(m.months!=null && m.months<=24) out.push({key:"structural",weight:68,title:"CMBS rigidity into maturity",detail:"CMBS loans are hard to modify and costly to prepay (defeasance/yield maintenance). Model that cost now and start the servicer conversation early."});
  }
  if(lt==="Debt fund / bridge"){
    if(m.floating) out.push({key:"structural",weight:64,title:"Bridge: floating-rate + extension risk",detail:"Bridge debt is floating and short. Check your extension test (often a DSCR/debt-yield hurdle plus a fee and a new rate cap) — you may not qualify when you need it."});
  }
  if(lt==="SBA"){
    out.push({key:"exposure",weight:60,title:"SBA = personal debt",detail:"SBA loans carry a personal guarantee. Treat this as personal exposure in every decision; check the prepayment step-down too."});
  }
  if(get("covenants").value==="Yes" && m.dscr!=null && m.dscr<(m.targetDSCR||1.25)){
    out.push({key:"structural",weight:66,title:"Covenant breach risk",detail:"You indicated financial covenants and coverage is below a typical required level — a covenant trip can precede any missed payment. Address it before it triggers."});
  }
  return out;
}

/* ---------- diagnostic scan: every dimension, status + one-liner ---------- */
function scan(m){
  function row(label,tone,note){return {label:label,tone:tone,note:note};}
  var rows=[];
  // coverage
  if(m.dscr==null) rows.push(row("Debt-service coverage","unknown","Add NOI and a payment to assess."));
  else { var b=E.dscrBand(m.dscr); rows.push(row("Debt-service coverage", b.tone, "DSCR "+fmtX(m.dscr)+" — "+b.label.split("—").slice(-1)[0].trim())); }
  // leverage / refi proceeds
  if(m.refiGap==null) rows.push(row("Leverage / refinance proceeds","unknown","Add balance + NOI to test the refi gap."));
  else rows.push(row("Leverage / refinance proceeds", m.refiGap>0?"critical":"good", m.refiGap>0?("Shortfall ~"+fmtMoney(m.refiGap)+" to refinance"):"Supportable debt covers the balance"));
  // maturity
  rows.push(row("Loan maturity", m.maturityRisk.tone, m.months!=null?(m.maturityRisk.score+" — "+m.months+" months out"):"Add maturity date"));
  // rate
  if(m.floating) rows.push(row("Interest-rate exposure","warn","Floating rate — exposed to further increases"));
  else if(valOfSafe("rate")!=null) rows.push(row("Interest-rate exposure","ok","Fixed / known rate"));
  else rows.push(row("Interest-rate exposure","unknown","Add rate + type"));
  // capex
  rows.push(row("Capital / PIP burden", m.capexPressure.tone, m.capexTotal?(m.capexPressure.score+" — "+fmtMoney(m.capexTotal)+" identified"):"None entered"));
  // capital stack / equity cushion
  if(m.stack && m.stack.value!=null) rows.push(row("Capital stack / equity cushion", m.stack.sponsorStatus==="wiped"?"critical":(m.stack.equityCushionPct!=null&&m.stack.equityCushionPct<10?"warn":"good"), m.stack.sponsorStatus==="wiped"?"Equity underwater at today’s value":("Value can fall ~"+Math.round(m.stack.equityCushionPct)+"% before equity is wiped")));
  else rows.push(row("Capital stack / equity cushion","unknown","Add property value (or cap rate) to test"));
  // personal exposure
  if(m.exposure) rows.push(row("Personal exposure / liability", m.exposure.severity>=70?"critical":m.exposure.severity>=40?"warn":m.exposure.severity>=20?"ok":"unknown", m.exposure.title));
  else rows.push(row("Personal exposure / liability","unknown","Add recourse + guarantee"));
  // distribution
  if(m.otaShare!=null && m.otaComm!=null){ var costly=(m.otaShare*m.otaComm/100)>=12; rows.push(row("Distribution / channel cost", costly?"warn":"ok", costly?("High OTA cost — ~"+Math.round(m.otaShare*m.otaComm/100)+"% of room revenue to commissions"):"Channel cost looks contained")); }
  else rows.push(row("Distribution / channel cost","unknown","Add OTA mix + commission"));
  return rows;
}
function valOfSafe(k){return valOf(k);}

/* ---------- operations plausibility ---------- */
function opsPlausibility(m){
  if(!m.noiLift||m.noiLift.alreadyMeets)return null;
  var pos=get("marketPosition").value;
  var adrLiftPct=(m.adr&&m.noiLift.adrIncreaseAtCurrentOcc)?(m.noiLift.adrIncreaseAtCurrentOcc/m.adr*100):null;
  if(adrLiftPct==null)return {tone:"unknown",verdict:"Add ADR, occupancy, and your comp-set position to judge how realistic an operations-only fix is."};
  var tight=pos==="Above comp set (limited headroom)", roomy=pos==="Below comp set (room to grow)";
  if(tight)return {tone:"warn",verdict:"Operations alone is unlikely to close the gap — you’re already at or above your comp set, so the capital stack probably needs to change.",adrLiftPct:adrLiftPct};
  if(adrLiftPct<=7)return {tone:"good",verdict:"Likely fixable through operations — the required rate/occupancy lift is modest"+(roomy?", and your below-comp-set position suggests real upside.":"."),adrLiftPct:adrLiftPct};
  if(adrLiftPct<=15)return {tone:"ok",verdict:"Possibly fixable through operations, but it would take a serious commercial push"+(roomy?" — your below-comp-set position helps.":"."),adrLiftPct:adrLiftPct};
  return {tone:"warn",verdict:"The required lift is large; operations may help but the capital stack likely needs to change too.",adrLiftPct:adrLiftPct};
}

/* ---------- time-phased action roadmap (the "what should I do, in what order" layer) ---------- */
function buildRoadmap(m){
  var now=[],near=[],mat=[],lng=[];
  var pl=opsPlausibility(m), gap=m.refiGap, liq=m.liquidity, conf=overallConfidence();

  // NOW (this week)
  if(conf.pct<70) now.push({a:"Pin down your real numbers",w:"Pull your latest loan statement, T-12 P&L, and loan agreement so this read is lender-grade, not directional.",who:"Bookkeeper / CPA",prep:"Loan statement, T-12, loan agreement"});
  if(m.dscr!=null&&m.dscr<1.0) now.push({a:"Protect cash and call your lender before you miss a payment",w:"NOI isn’t covering debt service today. Lenders respond far better to an early, proactive call than to a missed payment.",who:"You + lender (attorney if recourse)"});
  if(m.months!=null&&m.months<=6) now.push({a:"Open the maturity conversation immediately",w:"Maturity is within ~6 months, so time is the binding constraint. Ask what an extension would require.",who:"Lender; consider a mortgage broker"});
  if(m.exposure&&m.exposure.severity>=55) now.push({a:"Understand your personal exposure before you act",w:"You appear personally on the hook — know what’s at risk and which moves could trip guaranty carve-outs.",who:"Real-estate attorney"});
  if(get("cashMgmt").value==="Yes"&&m.dscr!=null&&m.dscr<1.25) now.push({a:"Check your cash-trap headroom",w:"With a lockbox and thin coverage, a sweep could divert your cash — confirm the trigger level and your distance from it.",who:"Loan servicer"});
  if(!now.length) now.push({a:"Bank the good news, then stress-test it",w:"Coverage looks okay today — use the scenario tools to see how a rate move, capex, or maturity could change that."});

  // NEXT 30–90 DAYS
  if(pl&&(pl.tone==="good"||pl.tone==="ok")) near.push({a:"Build a 90-day commercial plan to lift NOI",w:"Operations can realistically move the number"+(m.noiLift?" (target ~"+fmtMoney(m.noiLift.noiLift)+")":"")+" through rate, channel mix, and cost — and shifting bookings to direct cuts commission straight to NOI.",who:"Revenue management / MHS",prep:"STR report, channel mix, rate calendar"});
  if(gap!=null&&gap>0){
    if(liq!=null&&liq>=gap) near.push({a:"Model a principal paydown to close the gap",w:"Your indicated cash (~"+fmtMoney(liq)+") looks sufficient to bridge the ~"+fmtMoney(gap)+" shortfall and unlock better refinance terms.",who:"Lender / CPA"});
    else near.push({a:"Start conversations with capital sources",w:"The ~"+fmtMoney(gap)+" gap looks larger than your available cash, so plan for outside capital (preferred or JV equity) or a partial paydown plus an NOI lift.",who:"Capital advisor / broker"});
  }
  near.push({a:"Assemble your lender package",w:"Get ahead of any ask with a clean story rather than a scramble later.",prep:"T-12, debt schedule, 12-month forecast, capex plan, market narrative"});
  if(m.capexPressure&&(m.capexPressure.score==="High"||m.capexPressure.score==="Medium")) near.push({a:"Firm up your PIP / capex scope and timing",w:"Get real bids and negotiate timing or phasing with the brand so capital needs don’t collide with debt service.",who:"Brand / general contractor"});
  if(m.floating) near.push({a:"Price interest-rate protection",w:"You’re floating — get quotes on a rate cap so a further rate move doesn’t quietly erode coverage."});

  // BEFORE MATURITY
  if(m.months!=null){
    mat.push({a:"Re-test refinance readiness 6–9 months out",w:"Re-run this diagnostic once the NOI plan has traction to see whether the gap has actually closed."});
    mat.push({a:"Validate value and solicit quotes early",w:"Get an appraisal or broker opinion of value and test refinance quotes — don’t wait until you’re forced to transact.",who:"Appraiser / mortgage broker"});
    mat.push({a:"Decide the path: refinance, extend, recapitalize, or sell",w:"Choose based on whether NOI and value support the balance. If a gap persists, line up equity or negotiate an extension; if it’s too large, a planned sale can beat a forced refinance.",who:"Lender / broker / capital advisor"});
  } else {
    mat.push({a:"Find and confirm your maturity date",w:"It drives all the timing — locate it in your loan agreement and set reminders 12 and 6 months out.",prep:"Loan agreement"});
  }

  // LONG TERM
  lng.push({a:"Right-size the stack for the next cycle",w:"Target a leverage and DSCR cushion you can live with, and decide fixed-vs-floating and term length deliberately rather than by default."});

  b.appendChild(el('<div class="callout warn small">This is conversation preparation, not legal advice. Loan modifications and forbearance have legal and credit consequences — involve your attorney and CPA before signing anything.</div>'));
  return d;
}
function renderExportBar(m){

  card.appendChild(el('<p class="section-sub">Generate an owner memo you can save, print, or share with an advisor. Marked clearly as prepared from your inputs and estimates.</p>'));

function renderCTA(m){

    ? "Your diagnostic suggests the debt problem may be partly solvable through NOI improvement. MHS can help build the commercial recovery plan: pricing, channel mix, OTA strategy, group sales, direct booking, and acquisition efficiency."

  band.querySelector("button").onclick=function(){alert("In the live product this opens MHS scheduling. (Placeholder in this prototype.)");};

/* ---------- MEMO ---------- */
function memoHTML(m){
  var name=(S.anon||!S.propertyName)?"Subject hotel (anonymous)":S.propertyName;
  var date=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  function row(a,b){return '<tr><td>'+a+'</td><td style="text-align:right">'+b+'</td></tr>';}
  var nl=m.noiLift&&!m.noiLift.alreadyMeets?m.noiLift:null;
  var pl=opsPlausibility(m);
  var assumptions=m.assumptions.map(function(a){return '<li>'+a+'</li>';}).join("")||"<li>Core inputs provided directly.</li>";
  var opts=relevantOptions(m).map(function(o){return '<li><strong>'+o.n+'</strong> — solves: '+o.solves+'; doesn’t solve: '+o.notsolve+'; control: '+o.control+'; best fit: '+o.fit+'.</li>';}).join("");
  var conf=overallConfidence();
  var g=m.refiGapObj;
  return ''+
  '<div style="max-width:760px;margin:0 auto;font-family:Georgia,\'Times New Roman\',serif;color:#16242c;line-height:1.55">'+
  '<div style="border-bottom:3px solid #1f8a8a;padding-bottom:10px;margin-bottom:18px"><div style="font-family:Arial,sans-serif;font-weight:800;letter-spacing:.04em;color:#0e2a3b">MODERN HOSPITALITY SOLUTIONS</div><div style="font-family:Arial,sans-serif;color:#5d7079;font-size:13px">Hotel Capital Stack Diagnostic — Owner Memo</div></div>'+
  '<p style="font-size:13px;color:#5d7079">'+name+' · Prepared '+date+'</p>'+
  '<h2 style="color:#0e2a3b">1. Situation summary</h2><p>After debt service, the property generates about <strong>'+fmtMoney(m.cashAfterDebt)+'/yr</strong> (DSCR '+fmtX(m.dscr)+' vs. a '+fmtX(m.targetDSCR)+' target). The primary issue appears to be <strong>'+m.triage.primary.title.toLowerCase()+'</strong>. '+m.triage.primary.detail+'</p>'+
  '<h2 style="color:#0e2a3b">2. Current debt health</h2><table style="width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:14px">'+row("Cash after debt service",fmtMoney(m.cashAfterDebt))+row("Current DSCR",fmtX(m.dscr))+row("Annual debt service",fmtMoney(m.annualDebtService))+row("Debt yield",m.debtYield!=null?fmtPct(m.debtYield,1):"—")+row("Maturity risk",m.maturityRisk.score+(m.months!=null?(" ("+m.months+" mo)"):""))+'</table>'+
  '<h2 style="color:#0e2a3b">3. Operating performance</h2><p>Estimated NOI '+fmtMoney(m.noi)+(m.noiSrc?(" ("+m.noiSrc+")"):"")+'. '+(m.occ!=null?("Occupancy ~"+fmtPct(m.occ,0)+", "):"")+(m.adr!=null?("ADR ~"+fmtMoney(m.adr)+". "):"")+(get("noiBasis").value==="No / not sure"?"<em>Note: NOI may not yet reflect a management fee and reserve and could be overstated.</em>":"")+'</p>'+
  '<h2 style="color:#0e2a3b">4. Capital needs</h2><p>Identified capital need '+fmtMoney(m.capexTotal)+' ('+m.capexPressure.score+' pressure). Net of reserves: '+fmtMoney(m.capexNet)+'.'+(m.liquidity!=null?(' Owner indicates ~'+fmtMoney(m.liquidity)+' of injectable cash.'):'')+'</p>'+
  '<h2 style="color:#0e2a3b">5. Refinance readiness</h2><table style="width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:14px">'+row("Supportable new debt",m.supportable.loan!=null?fmtMoney(m.supportable.loan):"—")+(g?row("Total needed at maturity (incl. capex & costs)",fmtMoney(g.uses)):"")+row("Refinance gap",m.refiGap!=null?fmtMoney(m.refiGap)+(m.refiGap>0?" (shortfall)":" (surplus)"):"—")+row("Required NOI to refinance",fmtMoney(m.requiredNOItoRefi))+'</table>'+
  (nl?('<h2 style="color:#0e2a3b">6. Operational fix potential</h2><p>To support the current balance, NOI would need to rise by <strong>'+fmtMoney(nl.noiLift)+'</strong> — roughly '+fmtMoney(nl.annualRevenueIncrease)+' of incremental revenue'+(nl.adrIncreaseAtCurrentOcc!=null?(', equivalent to +'+fmtMoney(nl.adrIncreaseAtCurrentOcc)+' ADR at current occupancy'):"")+(nl.occPointIncreaseAtCurrentADR!=null?(', or +'+fmtPct(nl.occPointIncreaseAtCurrentADR,1)+' occupancy points at current ADR'):"")+'.'+(pl?(' <strong>'+pl.verdict+'</strong>'):'')+'</p>'):"")+
  (function(){
    var rm=buildRoadmap(m);
    function L(items){return items.map(function(it){return '<li><strong>'+it.a+'</strong> — '+it.w+(it.who?(' <em>('+it.who+')</em>'):'')+'</li>';}).join("");}
    return '<h2 style="color:#0e2a3b">7. Action roadmap</h2>'+
      '<p style="font-size:14px;margin:6px 0 2px"><strong>Now:</strong></p><ul style="font-size:14px">'+L(rm.now)+'</ul>'+
      '<p style="font-size:14px;margin:6px 0 2px"><strong>Next 30–90 days:</strong></p><ul style="font-size:14px">'+L(rm.near)+'</ul>'+
      '<p style="font-size:14px;margin:6px 0 2px"><strong>Before maturity:</strong></p><ul style="font-size:14px">'+L(rm.mat)+'</ul>'+
      '<p style="font-size:14px;margin:6px 0 2px"><strong>Long term:</strong></p><ul style="font-size:14px">'+L(rm.lng)+'</ul>';
  })()+
  '<h2 style="color:#0e2a3b">8. What would improve this analysis</h2><p style="font-size:14px">Confirm loan balance, maturity date, T-12 NOI, and PIP requirement. For a lender-ready package: full T-12, debt schedule, capex plan, appraisal, and borrower liquidity.</p>'+
  (function(){var parts="";
    if(m.stack&&m.stack.value!=null){parts+='<p>Capital stack at an estimated value of '+fmtMoney(m.stack.value)+': '+(m.stack.sponsorStatus==="wiped"?'common equity is underwater (debt/pref exceed value).':'value can fall ~'+Math.round(m.stack.equityCushionPct)+'% before equity is wiped.')+' '+m.stack.layers.map(function(l){return l.name+' '+l.status;}).join('; ')+'.</p>';}
    if(m.exposure)parts+='<p>Personal exposure — '+m.exposure.title+': '+m.exposure.flags.join(' ')+'</p>';
    if(m.lenderType&&LOAN_PROFILES[m.lenderType]){var p=LOAN_PROFILES[m.lenderType];parts+='<p>Loan type ('+m.lenderType+') — watch: '+p.risks.join('; ')+'. Tactics: '+p.tactics.join('; ')+'.</p>';}
    return parts?('<h2 style="color:#0e2a3b">9. Capital stack &amp; exposure</h2>'+parts):"";})()+
  '<h2 style="color:#0e2a3b">10. Assumptions used</h2><ul style="font-size:14px">'+assumptions+'</ul><p style="font-size:13px;color:#5d7079"><em>Overall confidence: '+conf.label+' ('+conf.pct+'%), based on data completeness.</em></p>'+
  '<h2 style="color:#0e2a3b">11. Disclaimer</h2><p style="font-size:12px;color:#5d7079;background:#f5f7f8;padding:12px;border-radius:8px">Prepared from user-provided and estimated information. This memo is a diagnostic and planning aid only — not financial, legal, tax, lending, or investment advice, and not a lending commitment. Figures may be estimates or ranges. Verify all numbers and consult your lender, CPA, attorney, broker, or capital advisor before making decisions.</p>'+
  '<p style="font-size:11px;color:#9aa6ad;text-align:center;margin-top:20px">Watermark: Prepared from user-provided and estimated information · Modern Hospitality Solutions</p></div>';
}
function downloadMemo(m){var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>MHS Owner Memo</title></head><body style="margin:30px">'+memoHTML(m)+'</body></html>';var blob=new Blob([html],{type:"text/html"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="MHS-Owner-Memo.html";document.body.appendChild(a);a.click();a.remove();}
function openMemoPrint(m){var w=window.open("","_blank");if(!w){alert("Pop-up blocked — allow pop-ups or use the download button.");return;}w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>MHS Owner Memo</title></head><body style="margin:30px">'+memoHTML(m)+'<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},250);}</scr'+'ipt></body></html>');w.document.close();}

/* ---------- PRIVACY ---------- */
function openPrivacy(){
  var root=document.getElementById("modalRoot"), saved=hasSaved();
  var bg=el('<div class="modal-bg"></div>'),mod=el('<div class="modal"></div>');
  mod.innerHTML='<h3 style="color:var(--navy)">Your privacy</h3>'+
    '<p class="small">By default this tool runs <strong>only in your browser</strong>. Nothing you type is uploaded or sent anywhere, and nothing is used to train any model.</p>'+
    '<div class="checkrow"><input type="checkbox" id="anonChk" '+(S.anon?"checked":"")+'><label for="anonChk" class="small"><strong>Anonymous mode</strong> — don’t ask for or show a property name anywhere, including the memo.</label></div>'+
    '<div class="checkrow"><input type="checkbox" id="saveChk" '+(saved?"checked":"")+'><label for="saveChk" class="small"><strong>Save my progress on this browser</strong> (optional) — stores answers locally on this device only; never uploaded.</label></div>'+
    (S.anon?"":'<div class="field" style="margin-top:8px"><label class="small">Property name (optional, only used on the memo)</label><input type="text" id="propName" value="'+(S.propertyName||"")+'" placeholder="Leave blank to stay anonymous"></div>')+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px"><button class="btn primary sm" id="privSave">Save settings</button><button class="btn ghost sm" id="privDelete">Delete all my data</button><button class="btn ghost sm" id="privClose">Close</button></div>'+
    '<p class="small muted" style="margin-top:12px">A plain-English data policy is included in <strong>data-retention-policy.md</strong>.</p>';
  bg.appendChild(mod);root.appendChild(bg);
  bg.onclick=function(e){if(e.target===bg)root.innerHTML="";};
  mod.querySelector("#anonChk").onchange=function(e){S.anon=e.target.checked;root.innerHTML="";openPrivacy();syncTopbar();};
  mod.querySelector("#privClose").onclick=function(){root.innerHTML="";};
  mod.querySelector("#privSave").onclick=function(){S.anon=mod.querySelector("#anonChk").checked;var pn=mod.querySelector("#propName");if(pn)S.propertyName=pn.value;if(mod.querySelector("#saveChk").checked)saveLocal();else clearLocal();root.innerHTML="";syncTopbar();render();};
  mod.querySelector("#privDelete").onclick=function(){clearLocal();S={mode:S.mode,anon:false,step:0,propertyName:"",f:{}};root.innerHTML="";render();alert("All locally stored data has been deleted and your session has been reset.");};
}
function saveLocal(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({anon:S.anon,propertyName:S.propertyName,f:S.f,mode:S.mode}));}catch(e){}}
function clearLocal(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
function hasSaved(){try{return !!localStorage.getItem(SAVE_KEY);}catch(e){return false;}}
function loadLocal(){try{var raw=localStorage.getItem(SAVE_KEY);if(!raw)return;var o=JSON.parse(raw);S.anon=!!o.anon;S.propertyName=o.propertyName||"";S.f=o.f||{};if(o.mode)S.mode=o.mode;}catch(e){}}

/* ---------- router ---------- */
function render(){
  if(hasSaved())saveLocal();
  if(S.step===0){renderLanding();return;}
  if(S.mode==="quick"){ if(S.step>=2){renderQuick();} else {renderQuick();} window.scrollTo({top:0,behavior:"smooth"}); return; }
  renderStep();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ---------- init ---------- */
document.querySelectorAll("#modeswitch button").forEach(function(b){b.onclick=function(){S.mode=b.dataset.mode;S.step=Math.max(1,S.step);if(S.mode==="quick")S.step=1;syncTopbar();render();};});
document.getElementById("privacyBtn").onclick=openPrivacy;
loadLocal();render();
})();

</script>
